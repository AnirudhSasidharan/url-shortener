<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>snip. — URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --accent3: #6affd4;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4ade80;
    --error: #f87171;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── GLOW ── */
  .glow-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-blob.a { width: 500px; height: 500px; background: rgba(124,106,255,0.12); top: -100px; left: -100px; }
  .glow-blob.b { width: 400px; height: 400px; background: rgba(255,106,155,0.08); bottom: -80px; right: -80px; }

  /* ── LAYOUT ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 56px;
  }
  .logo {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-dot { color: var(--accent3); -webkit-text-fill-color: var(--accent3); }
  .tagline {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: rgba(124,106,255,0.3); }

  .card-title {
    font-size: 0.7rem;
    font-family: var(--font-mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  /* ── INPUT ROW ── */
  .input-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  input[type="text"], input[type="url"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    flex: 1;
    min-width: 200px;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
  }
  input::placeholder { color: var(--muted); }

  .btn {
    background: linear-gradient(135deg, var(--accent), #9b6aff);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 24px;
    font-family: var(--font-display);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    font-size: 0.75rem;
    border-radius: 7px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RESULT BOX ── */
  .result-box {
    display: none;
    margin-top: 18px;
    background: var(--surface2);
    border: 1px solid rgba(106, 255, 212, 0.25);
    border-radius: 10px;
    padding: 16px 20px;
    animation: slideIn 0.3s ease;
  }
  .result-box.show { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .result-url {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--accent3);
    word-break: break-all;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .stat-num {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 0.72rem;
    font-family: var(--font-mono);
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
  }

  /* ── TABLE ── */
  .url-table { width: 100%; border-collapse: collapse; }
  .url-table th {
    text-align: left;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .url-table td {
    padding: 12px 12px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    font-size: 0.85rem;
    vertical-align: middle;
  }
  .url-table tr:last-child td { border-bottom: none; }
  .url-table tr:hover td { background: rgba(124,106,255,0.04); }

  .short-link {
    font-family: var(--font-mono);
    color: var(--accent);
    text-decoration: none;
    font-size: 0.83rem;
  }
  .short-link:hover { color: var(--accent3); }

  .original-url {
    color: var(--muted);
    font-size: 0.8rem;
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    display: block;
  }

  .click-badge {
    display: inline-block;
    background: rgba(124,106,255,0.15);
    color: var(--accent);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 500;
  }

  /* ── ANALYTICS PANEL ── */
  #analytics-panel {
    display: none;
    animation: slideIn 0.3s ease;
  }
  #analytics-panel.show { display: block; }

  .click-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .click-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    flex-wrap: wrap;
  }
  .click-time { color: var(--accent3); }
  .click-ip { color: var(--muted); }
  .click-ua { color: var(--muted); font-size: 0.7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--text);
    z-index: 100;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: rgba(74,222,128,0.4); color: var(--success); }
  .toast.error { border-color: rgba(248,113,113,0.4); color: var(--error); }

  /* ── SEARCH ── */
  .search-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .search-row input { max-width: 280px; flex: none; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.85rem;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="glow-blob a"></div>
<div class="glow-blob b"></div>

<div class="container">

  <!-- HEADER -->
  <header>
    <div class="logo">snip<span class="logo-dot">.</span></div>
    <div class="tagline">// url shortener + analytics</div>
  </header>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">total links</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-clicks">0</div>
      <div class="stat-label">total clicks</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-top">—</div>
      <div class="stat-label">top link</div>
    </div>
  </div>

  <!-- SHORTEN FORM -->
  <div class="card">
    <div class="card-title">// shorten a url</div>
    <div class="input-row">
      <input type="url" id="long-url" placeholder="https://your-very-long-url.com/goes/here" />
      <input type="text" id="custom-alias" placeholder="custom alias (optional)" style="max-width:200px" />
      <button class="btn" onclick="shortenUrl()">Shorten →</button>
    </div>
    <div class="result-box" id="result-box">
      <span class="result-url" id="result-url"></span>
      <button class="btn-sm" onclick="copyResult()">copy</button>
    </div>
  </div>

  <!-- URL TABLE -->
  <div class="card">
    <div class="card-title">// all links</div>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="filter by alias or url..." oninput="filterTable()" />
      <button class="btn-sm" onclick="loadAllUrls()">↻ refresh</button>
    </div>
    <div id="table-container">
      <div class="empty">No links yet. Shorten something above.</div>
    </div>
  </div>

  <!-- ANALYTICS PANEL -->
  <div class="card" id="analytics-panel">
    <div class="card-title">// analytics — <span id="analytics-code" style="color:var(--accent3)"></span></div>
    <div style="margin-bottom:16px">
      <span style="font-size:0.82rem;color:var(--muted);font-family:var(--font-mono)">Total clicks: </span>
      <span id="analytics-total" style="font-weight:700;color:var(--accent)"></span>
    </div>
    <div class="click-list" id="click-list"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'http://localhost:8000';
  let allUrls = [];

  // ── TOAST ────────────────────────────────────────────────────────────────────
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.className = 'toast', 2500);
  }

  // ── SHORTEN ──────────────────────────────────────────────────────────────────
  async function shortenUrl() {
    const url = document.getElementById('long-url').value.trim();
    const alias = document.getElementById('custom-alias').value.trim();
    if (!url) return toast('Paste a URL first', 'error');

    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.textContent = 'Shortening...';

    try {
      const res = await fetch(`${API}/shorten`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ original_url: url, custom_alias: alias || null }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed');

      const box = document.getElementById('result-box');
      document.getElementById('result-url').textContent = data.short_url;
      box.className = 'result-box show';
      toast('Link shortened!', 'success');
      loadAllUrls();
    } catch (e) {
      toast(e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Shorten →';
    }
  }

  function copyResult() {
    const url = document.getElementById('result-url').textContent;
    navigator.clipboard.writeText(url);
    toast('Copied to clipboard', 'success');
  }

  // ── LOAD ALL ─────────────────────────────────────────────────────────────────
  async function loadAllUrls() {
    try {
      const res = await fetch(`${API}/stats/all`);
      allUrls = await res.json();
      renderTable(allUrls);
      updateStats(allUrls);
    } catch {
      document.getElementById('table-container').innerHTML =
        '<div class="empty">⚠ Could not connect to API. Is the backend running?</div>';
    }
  }

  function updateStats(urls) {
    const total = urls.length;
    const clicks = urls.reduce((s, u) => s + u.click_count, 0);
    const top = urls.sort((a,b) => b.click_count - a.click_count)[0];
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-clicks').textContent = clicks;
    document.getElementById('stat-top').textContent = top ? top.short_code : '—';
  }

  function renderTable(urls) {
    const container = document.getElementById('table-container');
    if (!urls.length) {
      container.innerHTML = '<div class="empty">No links yet.</div>';
      return;
    }
    container.innerHTML = `
      <table class="url-table">
        <thead>
          <tr>
            <th>Short Link</th>
            <th>Original URL</th>
            <th>Clicks</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${urls.map(u => `
            <tr>
              <td><a class="short-link" href="${API}/${u.short_code}" target="_blank">${u.short_code}</a></td>
              <td><span class="original-url" title="${u.original_url}">${u.original_url}</span></td>
              <td><span class="click-badge">${u.click_count}</span></td>
              <td style="color:var(--muted);font-family:var(--font-mono);font-size:0.78rem">${new Date(u.created_at).toLocaleDateString()}</td>
              <td><button class="btn-sm" onclick="loadAnalytics('${u.short_code}')">analytics</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  function filterTable() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const filtered = allUrls.filter(u =>
      u.short_code.toLowerCase().includes(q) ||
      u.original_url.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  // ── ANALYTICS ────────────────────────────────────────────────────────────────
  async function loadAnalytics(code) {
    try {
      const res = await fetch(`${API}/analytics/${code}`);
      const data = await res.json();

      document.getElementById('analytics-code').textContent = code;
      document.getElementById('analytics-total').textContent = data.total_clicks;

      const list = document.getElementById('click-list');
      if (!data.click_history.length) {
        list.innerHTML = '<div class="empty" style="padding:20px">No clicks yet.</div>';
      } else {
        list.innerHTML = data.click_history.map(c => `
          <div class="click-item">
            <span class="click-time">${new Date(c.timestamp).toLocaleString()}</span>
            <span class="click-ip">${c.ip_address}</span>
            <span class="click-ua">${c.user_agent}</span>
          </div>
        `).join('');
      }

      const panel = document.getElementById('analytics-panel');
      panel.className = 'card show';
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch {
      toast('Failed to load analytics', 'error');
    }
  }

  // ── INIT ─────────────────────────────────────────────────────────────────────
  loadAllUrls();

  // Enter key to shorten
  document.getElementById('long-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') shortenUrl();
  });
</script>
</body>
</html>
